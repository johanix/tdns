# The `tdns-cli ... keystore <sig0|dnssec> algorithms` listing shows
# algorithm sizes, NIST level, maturity, and description — these come from
# the server (no config needed). The only extra data is per-CPU signing/
# validation cost, which is machine-dependent and optional:
#
# algorithms:
#    # Multi-arch cost table produced by dnssec-algorithms/cmd/algbench
#    # (algorithm-costs.yaml). Point at a copy, or at the file in a
#    # dnssec-algorithms checkout. Omit to show the listing without cost
#    # columns.
#    costsfile: /etc/tdns/algorithm-costs.yaml
#    # Which architecture's costs to show. Defaults to this host's arch.
#    # costarch: amd64

apiservers:
   - name:              tdns-server
     baseurl:           https://127.0.0.1:8989/api/v1
     apikey:            winter-is-coming-santa-stuck-in-chimney
     authmethod:        X-API-Key

   - name:              tdns-agent
     baseurl:           https://127.0.0.1:8987/api/v1
     apikey:            winter-is-coming-santa-stuck-in-chimney
     authmethod:        X-API-Key
     # config_file:     /etc/tdns/tdns-agent.yaml   # optional; for tdns-cli agent keys generate/show

   - name:              tdns-reporter
     baseurl:           https://127.0.0.1:8991/api/v1
     apikey:            winter-is-coming-santa-stuck-in-chimney
