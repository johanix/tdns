include:
   - combiner-zones.yaml

# Combiner block (symmetric to agent:); our config and peer (agent)
combiner:
   long_term_jose_priv_key:	/etc/tdns/combiner.jose.private
   # chunk_mode:	edns0   # default: send payload in EDNS(0) CHUNK option
   # chunk_mode:	query   # store payload; receiver fetches via CHUNK query (then chunk_query_endpoint is required)
   # chunk_query_endpoint:	include   # when chunk_mode=query: signal CHUNK query endpoint in NOTIFY. Required when chunk_mode=query.
   # chunk_query_endpoint:	none      # when chunk_mode=query: receiver uses static config (combiner.agents[].address)
   # When combiner *receives* NOTIFY(CHUNK): always adapts (EDNS0 first, then CHUNK query; target = NOTIFY option if present, else combiner.agents[].address)
   agents:
      - identity:		agent.provider.
        address:		1.2.3.4:5678   # CHUNK query target when NOTIFY has no CHUNK_QUERY_ENDPOINT option
        long_term_jose_pub_key:	/etc/tdns/agent.jose.pub

apiserver:
   usetls:		true
   addresses:           [ 127.0.0.1:8085 ]
   apikey:              you-have-stolen-my-frotzblinger
   certFile:            /etc/tdns/certs/localhost..crt
   keyFile:             /etc/tdns/certs/localhost..key

service:
   name:                TDNS-COMBINER
   verbose:             true
   debug:               true   # writes processed zone to disk
   refresh:             true
   maxrefresh:          1800    # seconds. Cap refresh counter to max this

dnsengine:
   addresses:           [ 127.0.0.1:5366, '[::1]:5366']
   transports:		[ doq, dot, do53 ]
   # Zone list from include: (combiner-zones); zone paths from zonefile: when set

common:
   command:		/usr/local/libexec/tdns-combiner
   rootca:      	../etc/certs/PublicRootCAs.pem
   debug:		true
   verbose:		true

log:
   file:		/var/log/tdns/tdns-combiner.log

db:
   file:		/var/tmp/tdns-combiner.db
