# Main TDNS configuration for tdns-agent.
#
# tdns-agent is a SECONDARY-only server: it refuses primary zones (they are
# put in config-error state at startup) and it never signs, so online-signing
# and inline-signing are ignored. Host primary and/or signed zones on
# tdns-auth.
#
# There is no `multi-provider:` block here. The multi-provider role is
# implemented by tdns-mpagent in the tdns-mp repository, which owns that
# config; a standalone tdns-agent cannot parse it and would silently ignore
# the whole block. See tdns-mp/cmd/mpagent/tdns-mpagent.sample.yaml.
#
# Validate this file with:  tdns-cli agent config check --serverconfig <file>

include:
  - agent-zones.yaml

service:
   name:		TDNS-AGENT
   verbose:		true
   debug:		true   # writes processed zone to disk
   # Optional clamps on the SOA Refresh value used for secondary
   # zones. Both default in code (min 60s, max 8h) when unset.
   # Primaries are not affected (they reload from file on SIGHUP).
   # minrefresh:		60      # seconds, floor for SOA Refresh
   # maxrefresh:		1800    # seconds, ceiling for SOA Refresh

dnsengine:
   addresses:		[ 127.0.0.1:5357, '[::1]:5357']
   transports:		[ doq, dot, do53 ]
   # The encrypted transports (dot/doq/doh) need their own cert/key; without
   # them those listeners are silently skipped and only do53 comes up.
   certfile:		/etc/tdns/certs/localhost.crt
   keyfile:		/etc/tdns/certs/localhost.key
   # Zone file path comes from zone's zonefile: when set (no filedir/filetmpl needed)

apiserver:
   addresses:     	[ 127.0.0.1:8987 ]
   apikey:         	winter-is-coming-santa-stuck-in-chimney
   certfile:		/etc/tdns/certs/localhost.crt
   keyfile:		/etc/tdns/certs/localhost.key

server:
   id:			ooga booga boo
   version:		tdns-agent {version}
   hostname:		there-is-no-place-like-127.0.0.1

validator:
   active:		true
   verbose:		true
   debug:		true
   dnskey:
      trusted:
         file:		/etc/tdns/trust-anchors.yaml
   sig0:
      trusted:
         file:		/etc/tdns/sig0-keys.yaml

resolver:
   address:		8.8.8.8:53

# Named delegation backends for parent zones that receive child UPDATEs.
# Two predefined backends need no config: "db" and "direct".
# Named backends are only needed for types that require parameters.
# Zones reference backends by name via "delegationbackend: <name>".
#
# A zone that has 'allow-child-updates' MUST specify a 'delegationbackend:'.
# Without one the read path (scanner) and write path (zone updater) disagree
# on where current delegation data lives, and DS/NS records accumulate
# without ever being removed.
delegationbackends:
   - name:		files-dnslab
     type:		zonefile
     directory:	/var/lib/tdns/delegations/dnslab
     # notify-command: "rndc reload {ZONENAME}"

# In zone config, reference a backend:
#   zones:
#     - name:  dnslab.
#       delegationbackend: db            # predefined, no config needed
#     - name:  example.com.
#       delegationbackend: files-dnslab  # looked up from delegationbackends above

delegationsync:
   # Leader election TTL: how long a leader remains valid before re-election.
   # Elections require ALL configured peers to participate — if any peer is
   # unreachable, the election fails and parent-facing operations freeze.
   leader-election-ttl:	60m
   parent:
      # in parent zones, we support these schemes, and will publish DSYNC RRs
      # if allowed to:
      schemes:		[ notify, update ]
      notify:
         types:		[ CDS, CSYNC ]
         port:		5354				# MUST be a port the dnsengine listens on
         target:	notifications.{ZONENAME}	# {ZONENAME} will be expanded at run-time
         addresses:	[ 127.0.0.1, '::1' ]		# There must be no port and also no '[]' around v6 addresses here
      update:
         types:		[ ANY ]
         port:		5354				# MUST be a port the dnsengine listens on
         target:	updates.{ZONENAME}
         addresses:	[ 127.0.0.1, '::1' ]
         keygen:
            mode:	internal # internal | external
            generator:	/opt/local/bin/dnssec-keygen
            algorithm:	ED25519
   child:
      # in child zones, we will attempt the following schemes, if the parent
      # supports them and we're allowed to modify the child zone if needed
      # (adding CDS, CSYNC, KEY RRs, re-signing, etc):
      schemes:		[ notify, update ]
      update:
         keygen:
            mode:	external # internal | external
            generator:	/opt/local/bin/dnssec-keygen
            algorithm:	ED25519

keybootstrap:
   consistent-lookup:
      iterations:	3
      interval:		60	# seconds between lookups
      nameservers:	all	# one | all

dnssec:
   large_algorithms: [ RSASHA512 ]   # by name; stand-in for large KSK

   # Authorizes the "large-ksk" policy's mixed KSK/ZSK pair below.
   split_algorithms:
      RSASHA512: [ ECDSAP256SHA256 ]

   policies:
      default:
         algorithm:  ED25519
         ksk:
            lifetime:  forever
         zsk:
            lifetime:  forever
         csk:
            lifetime:  none
         sigvalidity:
            default:  14d
            dnskey:   30d
            ds:       14d

      large-ksk:
         algorithm:  ECDSAP256SHA256
         ksk:
            algorithm:  RSASHA512
            lifetime:   90d
         zsk:
            algorithm:  ECDSAP256SHA256
            lifetime:   30d
         csk:
            lifetime:  none
         sigvalidity:
            default:  14d
            dnskey:   30d
            ds:       14d

      fastroll:
         algorithm:  ED25519
         ksk:
            lifetime:  48h
         zsk:
            lifetime:  12h   # drives automated ZSK rollover (KeyStateWorker)
         csk:
            lifetime:  none
         sigvalidity:
            default:  14d
            dnskey:   30d
            ds:       14d

db:
   file:		/var/tmp/tdns-agent.db

imrengine:
   active:		true
   root-hints:		/etc/tdns/root.hints
   addresses:		[ 127.0.0.1:5453, '[::1]:5453' ]
   transports:		[ do53 ]
   # IMR query debug logging: logs internal agent queries, cache hits/misses,
   # outbound iterative queries, and auth server responses to a separate file.
   # Enable before starting the agent to diagnose UNKNOWN/KNOWN peer state issues.
   logging:
      enabled:		false
      file:		/var/log/tdns/imr-debug.log
   # require_dnssec_validation: when true (default), TLSA lookups used for API transport
   # peer verification must have a secure DNSSEC validation state. Set to false in lab
   # environments where the full DNSSEC chain is not yet established.
   require_dnssec_validation: true

log:
   file:		/var/log/tdns/tdns-agent.log
   level:		info		# default level: debug|info|warn|error
   # subsystems:				# per-subsystem level overrides
   #    transport:	debug
   #    engine:		debug
   #    agent:		info

common:
   servername:		tdns-agent
   command:		/usr/local/libexec/tdns-agent
